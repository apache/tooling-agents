# Simplified from apache/beam .github/workflows/beam_Infrastructure_UsersPermissions.yml
# Expected: prt_checkout MEDIUM (limited permissions: pull-requests only)
name: Beam Infrastructure UsersPermissions
on:
  pull_request_target:
    types: [opened, synchronize]
    paths: ['OWNERS']
permissions:
  pull-requests: write
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Validate OWNERS file
        run: |
          python scripts/validate_owners.py
